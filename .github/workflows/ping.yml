name: Keep Render Alive

on:
  schedule:
    - cron: '*/10 * * * *'  # every 10 minutes
  workflow_dispatch:  # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping scoreboard
        run: curl -s -o /dev/null -w "%{http_code}" https://brainwreck.onrender.com/ || true
