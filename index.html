<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>BrainWreck</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Courier New',monospace;background:#060610;color:#0f0;display:flex;
justify-content:center;align-items:center;min-height:100vh;padding:12px;
user-select:none;-webkit-tap-highlight-color:transparent}
.c{max-width:440px;width:100%;text-align:center;position:relative}
h1{font-size:1.4rem;letter-spacing:3px;color:#0f0;margin:4px 0}
.sub{font-size:.7rem;color:#050;margin-bottom:8px}
.s{display:none}.s.a{display:block}
.b{background:#0a0a1a;color:#0f0;border:2px solid #0f0;padding:12px 24px;
font-size:1rem;font-family:'Courier New',monospace;cursor:pointer;width:100%;
margin:5px 0;border-radius:4px;transition:.2s}
.b:active{background:#0f0;color:#000}
.b.o{border-color:#f80;color:#f80}.b.o:active{background:#f80;color:#000}
.b.c{border-color:#0ff;color:#0ff}.b.c:active{background:#0ff;color:#000}
.b.s{padding:8px 16px;font-size:.8rem;width:auto;display:inline-block}
.inp{background:#0a0a1a;border:2px solid #0f0;color:#fff;font-size:1.2rem;
font-family:'Courier New',monospace;text-align:center;padding:10px;width:100%;
border-radius:4px;letter-spacing:2px;outline:none;margin:6px 0}
.inp:focus{border-color:#0f0;box-shadow:0 0 10px #0f04}
.seq{font-size:2.6rem;letter-spacing:10px;margin:16px 0;min-height:50px;color:#fff;font-weight:bold}
.timer{font-size:2.8rem;color:#f44;margin:10px 0;min-height:50px}
.hud{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #111;margin-bottom:10px;font-size:.7rem;gap:4px}
.hud .sc{color:#0ff;font-size:1rem;font-weight:bold}
.hud .lv{color:#f80;font-weight:bold}
.hud .pl{color:#888}
.dots{display:flex;gap:4px;justify-content:center;margin:10px 0}
.dots span{width:12px;height:12px;border-radius:50%;background:#111;border:1px solid #333}
.dots .ok{background:#0f0;border-color:#0f0}
.dots .no{background:#f44;border-color:#f44}
.dots .now{background:#111;border-color:#ff0;box-shadow:0 0 8px #ff0}
.lc{background:#0a0a1a;border:1px solid #1a2a1a;border-radius:8px;padding:10px;margin:5px 0;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.lc.lk{opacity:.4;cursor:default}
.lc .emo{font-size:1.4rem;min-width:36px}
.lc .info{flex:1;margin-left:8px;text-align:left}
.lc .nm{font-size:.85rem;color:#f80}
.lc .ds{font-size:.6rem;color:#444}
.lc .st{color:#ff0;font-size:.75rem}
.fb{font-size:1.6rem;min-height:36px;margin:8px 0}
.fb.g{color:#0f0}.fb.b{color:#f44}
.fb .pts{font-size:.8rem;color:#0ff}
.big{font-size:2.5rem;font-weight:bold}
.gr{color:#0f0}.rd{color:#f44}.cy{color:#0ff}.or{color:#f80}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.2}}
.blk{animation:bl .6s infinite}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.sl{animation:up .3s ease-out}

/* ── Level Background Themes (subtle, non-distracting) ── */
body{transition:background .8s ease, background-image .8s ease}
body.lv0{background:#060610}  /* menu */
body.lv1{background:radial-gradient(ellipse at 50% 30%,#1a0a2e 0%,#0a0610 60%,#060610 100%)}  /* Baby Brain: soft purple nursery */
body.lv2{background:linear-gradient(180deg,#061a1f 0%,#0a1220 30%,#060a14 70%,#040810 100%)}  /* Goldfish: deep water */
body.lv2::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
 background:radial-gradient(circle at 20% 80%,#0a3a44 0%,transparent 40%),
             radial-gradient(circle at 80% 20%,#062a34 0%,transparent 35%);
 opacity:.4;pointer-events:none;z-index:-1}
body.lv3{background:linear-gradient(160deg,#1a1008 0%,#140e0a 40%,#0a0806 100%)}  /* Awake: coffee warmth */
body.lv3::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
 background:radial-gradient(ellipse at 30% 70%,#3a2010 0%,transparent 50%),
             radial-gradient(ellipse at 70% 20%,#2a1808 0%,transparent 40%);
 opacity:.35;pointer-events:none;z-index:-1}
body.lv4{background:radial-gradient(ellipse at 50% 50%,#1a0a20 0%,#0e0616 50%,#060610 100%)}  /* Braincells: neural pink */
body.lv4::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
 background:radial-gradient(circle at 40% 60%,#3a1040 0%,transparent 40%),
             radial-gradient(circle at 60% 40%,#2a0a30 0%,transparent 35%);
 opacity:.3;pointer-events:none;z-index:-1}
body.lv5{background:radial-gradient(ellipse at 50% 0%,#1a2a10 0%,#0e1608 50%,#060a04 100%)}  /* Big Brain: expanding green glow */
body.lv5::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
 background:radial-gradient(circle at 50% 30%,#2a4a18 0%,transparent 50%);
 opacity:.25;pointer-events:none;z-index:-1}
body.lv6{background:linear-gradient(180deg,#10061a 0%,#0e0a18 40%,#080610 100%)}  /* Wizard: mystical violet */
body.lv6::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
 background:radial-gradient(circle at 50% 80%,#2a1040 0%,transparent 50%),
             repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(80,20,120,.03) 40px,rgba(80,20,120,.03) 41px);
 opacity:.4;pointer-events:none;z-index:-1}
body.lv7{background:#080c14}  /* Rain Man: moody blue-gray */
body.lv7::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
 background:linear-gradient(180deg,rgba(20,30,50,.4) 0%,rgba(10,15,25,.2) 50%,rgba(5,8,15,.3) 100%);
 opacity:.6;pointer-events:none;z-index:-1;
 animation:rain 6s linear infinite}
@keyframes rain{0%{opacity:.35}50%{opacity:.5}100%{opacity:.35}}
body.lv8{background:#020a08}  /* Supercomputer: dark terminal green */
body.lv8::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
 background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,0,.015) 2px,rgba(0,255,0,.015) 3px);
 opacity:.5;pointer-events:none;z-index:-1}
body.lv9{background:#000400}  /* Matrix: iconic code rain feel */
body.lv9::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;
 background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,255,0,.04) 2px,rgba(0,255,0,.04) 3px),
             radial-gradient(ellipse at 50% 0%,rgba(0,255,0,.06) 0%,transparent 60%);
 opacity:.6;pointer-events:none;z-index:-1}
.lb{font-size:.75rem;text-align:left;margin:12px 0}
.lb .r{display:flex;justify-content:space-between;padding:4px 8px;border-bottom:1px solid #111}
.lb .r.me{background:#0f01}
.lb .rk{color:#0f0;min-width:28px}
.lb .nm{color:#ccc;flex:1}
.lb .sc{color:#0ff;min-width:50px;text-align:right}
.lb .co{color:#555;font-size:.65rem;margin-left:6px}
.tabs{display:flex;gap:4px;margin-bottom:8px}
.tab{padding:6px 14px;font-size:.7rem;cursor:pointer;border:1px solid #333;background:#0a0a1a;color:#666;border-radius:4px;font-family:'Courier New',monospace}
.tab.on{background:#0f02;color:#0f0;border-color:#0f0}

/* ── Hard Mode Toggle Switch ── */
.hard-toggle{display:inline-flex;align-items:center;gap:4px;margin-right:8px}
.hard-toggle .switch{position:relative;width:44px;height:24px}
.hard-toggle .switch input{opacity:0;width:0;height:0}
.hard-toggle .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;
 background:#111;border:1px solid #333;border-radius:24px;transition:.3s}
.hard-toggle .slider:before{content:'';position:absolute;height:18px;width:18px;
 left:2px;bottom:2px;background:#555;border-radius:50%;transition:.3s}
.hard-toggle input:checked+.slider{background:#f440;border-color:#f44}
.hard-toggle input:checked+.slider:before{transform:translateX(20px);background:#f44}
.hard-toggle .label{font-size:.55rem;color:#666;letter-spacing:1px}
.hard-toggle input:checked~.label{color:#f44}
.hard-indicator{display:none;color:#f44;font-size:.65rem;letter-spacing:2px}
.hard-indicator.on{display:inline}

/* ── Custom Number Pad ── */
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-width:280px;margin:8px auto;
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none}
.nk{background:#0a0a1a;color:#0f0;border:2px solid #1a2a1a;font-size:1.4rem;
  font-family:'Courier New',monospace;padding:16px 12px;cursor:pointer;border-radius:6px;
  transition:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation;
  min-height:52px;display:flex;align-items:center;justify-content:center}
.nk:active,.nk.pressed{background:#0f0;color:#000;border-color:#0f0;transform:scale(.92)}
.nk.del{color:#f80;border-color:#2a1a0a;font-size:1.1rem}
.nk.del:active,.nk.del.pressed{background:#f80;color:#000}
.nk.go{color:#0ff;border-color:#0a2a2a;font-size:1.1rem}
.nk.go:active,.nk.go.pressed{background:#0ff;color:#000}

/* Compact recall for numpad */
#phaseRecall .fb{min-height:24px;font-size:1.3rem;margin:4px 0}
#phaseRecall .inp{font-size:1.5rem;padding:8px;margin:2px 0}
#phaseRecall .info{margin:2px 0}

/* ── Big Timer Bar (floats above keyboard on phone) ── */
#timerBar{
  position:sticky;top:0;z-index:100;
  background:#0a0a1a;border-bottom:2px solid #f44;
  padding:4px 0;margin:-8px -8px 8px -8px;
}
#timerBar .timer.big{font-size:2.8rem;margin:0;min-height:auto}
#timerBar .info{margin:0;font-size:.65rem}

/* ── DESKTOP / WIDE SCREEN (auto-detected) ── */
@media(min-width:768px){
  .c{max-width:900px}
  h1{font-size:2rem;letter-spacing:6px}
  .sub{font-size:.9rem}
  .seq{font-size:4.5rem;letter-spacing:20px;margin:24px 0}
  .timer{font-size:4rem}
  .inp{font-size:2rem;padding:16px;letter-spacing:8px;max-width:500px;margin:0 auto}
  .b{padding:16px 32px;font-size:1.2rem;max-width:400px;margin:8px auto}
  .b.s{padding:10px 20px;font-size:.9rem;max-width:200px}
  .hud{font-size:.85rem;padding:10px 0}
  .hud .sc{font-size:1.2rem}
  .fb{font-size:2.2rem}
  .fb .pts{font-size:1rem}
  .big{font-size:3.5rem}
  .info{font-size:.95rem}
  .lb{font-size:.85rem;max-width:600px;margin:12px auto}
  .lb .r{padding:6px 12px}
  .tabs{justify-content:center}
  .tab{font-size:.8rem;padding:8px 20px}

  /* Wider level cards */
  .lc{max-width:550px;margin:6px auto;padding:14px;width:100%}
  .lc .emo{font-size:1.8rem;min-width:44px}
  .lc .nm{font-size:1rem}
  .lc .ds{font-size:.7rem}

  /* Desktop dual-pane: game area + sidebar */
  .desk-layout{display:flex;gap:20px;align-items:flex-start;justify-content:center}
  .desk-main{flex:1;max-width:550px}
  .desk-side{width:280px;display:none}
  .desk-side.show{display:block}
  .desk-side .lb{font-size:.7rem;max-width:none;max-height:60vh;overflow-y:auto}

  /* Bigger dots */
  .dots span{width:16px;height:16px}
  .dots{gap:6px;margin:14px 0}

  /* Bigger timer bar on desktop */
  #timerBar .timer.big{font-size:5rem}
  #timerBar .info{font-size:.85rem}

  /* Center menu on desktop */
  #lvList{max-width:550px;margin:10px auto}
  #menu .hud{max-width:550px;margin-left:auto;margin-right:auto}
  .hard-toggle .label{font-size:.7rem}

  /* Hide numpad on PC — they have keyboards */
  .numpad{display:none}
}
</style>
</head>
<body><div class="c">
<canvas id="matrixRain" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:-2;opacity:0;transition:opacity .8s"></canvas>


<!-- LOGIN -->
<div id="login" class="s a">
<h1>BRAINWRECK</h1><div class="sub">how good is your memory… really?</div>
<div style="margin:16px 0"><input class="inp" id="userIn" placeholder="Your name" maxlength="16" autocomplete="off"></div>
<div class="info" style="font-size:.65rem;color:#444;margin:4px 0" id="countryInfo">Detecting country...</div>
<button class="b" onclick="doLogin()">ENTER</button>
<div id="loginErr" style="color:#f44;font-size:.7rem;margin-top:6px"></div>
</div>

<!-- MENU -->
<div id="menu" class="s">
<div class="hud"><span class="pl" id="mPl"></span><span id="onlineDot" style="font-size:.7rem">🟢</span><span class="sc" id="mSc"></span></div>
<div style="display:flex;justify-content:center;align-items:center;gap:6px;margin:8px 0">
  <label class="hard-toggle"><span class="switch"><input type="checkbox" id="hardSwitch" onchange="toggleHard()"><span class="slider"></span></span><span class="label" id="hardLabel">HARD MODE</span></label>
  <button class="b s" id="sumBtn" onclick="toggleSum()" style="width:auto;padding:4px 10px;font-size:.6rem;margin:0">Σ SUM</button>
</div>
<h1>BRAINWRECK</h1><div class="sub">choose your torture</div>
<div class="desk-layout">
  <div class="desk-main">
    <div id="lvList" style="margin:10px 0"></div>
  </div>
  <div class="desk-side" id="deskSidebar">
    <div class="info" style="margin-bottom:6px">🏆 Live Leaderboard</div>
    <div class="lb" id="deskLB"></div>
  </div>
</div>
<button class="b o" onclick="showLB('global')">🌍 Global</button>
<button class="b o" id="btnCountry" onclick="showLB('country')">🏳️ Country</button>
<button class="b s" style="margin-top:4px" onclick="logout()">Change Player</button>
</div>

<!-- GAME -->
<div id="game" class="s">
<div class="hud"><span class="pl" id="gPl"></span><span class="lv" id="gLv"></span><span class="sc" id="gSc"></span></div>
<div class="info" id="gStage"></div><div class="dots" id="gDots"></div>

<!-- Big countdown bar — always visible, floats above keyboard -->
<div id="timerBar" style="display:none">
  <div class="timer big cy" id="timerD">5</div>
  <div class="info" style="color:#f44">seconds remaining</div>
</div>

<div id="phaseMemo">
<div class="seq" id="seqD"></div>
<button class="b c" id="memBtn" onclick="startTimer()" style="display:none;max-width:260px">I MEMORIZED IT</button>
<button class="b s" id="chickenBtn" onclick="chickenOut()" style="display:none;margin-top:4px">nah, not ready… 🐔</button>
<div class="info" id="memoInfo">remember it… then press the button (or SPACE)</div>
</div>
<div id="phaseRecall" style="display:none"><div class="fb" id="fbEl"></div>
<input class="inp" id="ansIn" inputmode="none" autocomplete="off" readonly onclick="this.blur()">
<div class="info">tap the numbers below</div>
<div class="numpad" id="numpad">
  <button class="nk" data-key="1">1</button>
  <button class="nk" data-key="2">2</button>
  <button class="nk" data-key="3">3</button>
  <button class="nk" data-key="4">4</button>
  <button class="nk" data-key="5">5</button>
  <button class="nk" data-key="6">6</button>
  <button class="nk" data-key="7">7</button>
  <button class="nk" data-key="8">8</button>
  <button class="nk" data-key="9">9</button>
  <button class="nk del" data-key="del">⌫</button>
  <button class="nk" data-key="0">0</button>
  <button class="nk go" data-key="go">✓</button>
</div>
<button class="b s" style="margin-top:10px" onclick="quitLv()">Quit</button></div>
</div>

<!-- LEVEL DONE -->
<div id="lvDone" class="s sl">
<div class="big gr">CLEAR!</div>
<div class="info" id="dnName" style="font-size:1rem;color:#f80;margin:6px 0"></div>
<div class="big cy" id="dnScore"></div><div class="info">points</div>
<div id="dnStars" style="color:#ff0;margin:4px 0"></div>
<div id="dnNext" style="margin-top:12px"></div>
</div>

<!-- FAIL -->
<div id="lvFail" class="s sl">
<div class="big rd">WIPED OUT</div>
<div class="info" style="font-size:.85rem;color:#888;margin:6px 0" id="flDetail"></div>
<button class="b o" onclick="retryLv()">Retry</button>
<button class="b s" style="margin-top:6px" onclick="quitToMenu()">Menu</button>
</div>

<!-- LEADERBOARD -->
<div id="lbScreen" class="s">
<h1>LEADERBOARD</h1>
<div class="tabs">
<span class="tab on" id="tabGlobal" onclick="showLB('global')">🌍 Global</span>
<span class="tab" id="tabCountry" onclick="showLB('country')">🏳️ Country</span>
</div>
<div class="lb" id="lbList"></div>
<button class="b s o" style="margin-top:12px" onclick="showMenu()">Back</button>
</div>

</div>

<script>
// ═══ LEVELS ═══
const LV = [
 {id:1,n:'Baby Brain 🍼',e:'👶',d:'you got this… maybe',s:[
  {dig:3,t:5,m:1},{dig:4,t:4,m:1},{dig:5,t:3,m:1}]},
 {id:2,n:'Goldfish Memory 🐠',e:'🐠',d:'3-second attention span',s:[
  {dig:4,t:4,m:1.2},{dig:5,t:3,m:1.2},{dig:6,t:3,m:1.2}]},
 {id:3,n:'Slightly Awake ☕',e:'☕',d:'caffeine kicking in',s:[
  {dig:5,t:3,m:1.4},{dig:6,t:3,m:1.4},{dig:7,t:2,m:1.4}]},
 {id:4,n:'Two Braincells 🧠',e:'🧠',d:'they finally met',s:[
  {dig:6,t:3,m:1.6},{dig:7,t:2,m:1.6},{dig:8,t:2,m:1.6}]},
 {id:5,n:'Big Brain Time 🤯',e:'🤯',d:'IQ expanding rapidly',s:[
  {dig:7,t:2,m:1.8},{dig:8,t:2,m:1.8},{dig:9,t:2,m:1.8}]},
 {id:6,n:'Memory Wizard 🧙',e:'🧙',d:'you see numbers in your sleep',s:[
  {dig:8,t:2,m:2},{dig:9,t:2,m:2},{dig:10,t:1,m:2}]},
 {id:7,n:'Rain Man Mode 🌧️',e:'🌧️',d:'definitely definitely',s:[
  {dig:9,t:2,m:2.3},{dig:10,t:1,m:2.3},{dig:11,t:1,m:2.3}]},
 {id:8,n:'Supercomputer 🤖',e:'🤖',d:'beep boop remembering',s:[
  {dig:10,t:1,m:2.6},{dig:11,t:1,m:2.6},{dig:12,t:1,m:2.6}]},
 {id:9,n:'THE MATRIX 💊',e:'💊',d:'you ARE the mainframe',s:[
  {dig:12,t:1,m:3},{dig:13,t:1,m:3},{dig:14,t:1,m:3}]}
];

// ═══ STATE ═══
let G={un:'',sc:0,country:'XX',lv:null,stage:0,seq:'',exp:'',results:[],stars:{},tid:null,ts:0,hard:false,sum:false};
const SB_URL = (location.hostname==='localhost'||location.hostname==='127.0.0.1')
  ? 'http://localhost:8081'
  : 'https://brainwreck.onrender.com';

function ld(){try{let d=JSON.parse(localStorage.getItem('bw')||'{}');if(d.un)G.un=d.un;if(d.sc)G.sc=d.sc;if(d.st)G.stars=d.st;if(d.co)G.country=d.co}catch(e){}}
function sv(){localStorage.setItem('bw',JSON.stringify({un:G.un,sc:G.sc,st:G.stars,co:G.country}))}

// ═══ COUNTRY DETECTION ═══
async function detectCountry(){
  try{
    let r=await fetch('https://ipapi.co/json/');
    let d=await r.json();
    G.country=d.country_code||'XX';
    document.getElementById('countryInfo').textContent='📍 '+d.country_name+' ('+G.country+')';
  }catch(e){
    document.getElementById('countryInfo').textContent='📍 Could not detect — playing offline';
    G.country='XX';
  }
}

// ═══ SCOREBOARD API ═══
async function fetchLB(country){
  try{
    let url=SB_URL+'?limit=20';
    if(country&&country!=='global')url+='&country='+country;
    let controller=new AbortController();
    let timer=setTimeout(()=>controller.abort(),5000);
    let r=await fetch(url,{signal:controller.signal});
    clearTimeout(timer);
    return await r.json();
  }catch(e){return[]}
}
async function postScore(){
  try{
    await fetch(SB_URL,{method:'POST',headers:{'Content-Type':'application/json'},
     body:JSON.stringify({username:G.un,score:G.sc,country:G.country})});
  }catch(e){
    // Offline — queue for later
    let q=JSON.parse(localStorage.getItem('bwQueue')||'[]');
    q.push({username:G.un,score:G.sc,country:G.country,time:Date.now()});
    localStorage.setItem('bwQueue',JSON.stringify(q));
  }
}

// ═══ OFFLINE SYNC ═══
async function syncOffline(){
  let q=JSON.parse(localStorage.getItem('bwQueue')||'[]');
  if(!q.length)return;
  let synced=[];
  for(let s of q){
    try{
      await fetch(SB_URL,{method:'POST',headers:{'Content-Type':'application/json'},
       body:JSON.stringify(s)});
      synced.push(s);
    }catch(e){break} // stop on first failure
  }
  q=q.filter(s=>!synced.includes(s));
  localStorage.setItem('bwQueue',JSON.stringify(q));
  if(!q.length)localStorage.removeItem('bwQueue');
}

function updateOnlineStatus(){
  let el=document.getElementById('onlineDot');
  if(!el)return;
  if(navigator.onLine){
    el.textContent='🟢';el.title='Online';
    syncOffline();
  }else{
    el.textContent='🔴';el.title='Offline — scores queued';
  }
}

// ═══ SCREENS ═══
function ss(id){document.querySelectorAll('.s').forEach(e=>e.classList.remove('a'));document.getElementById(id).classList.add('a')}

// ═══ LOGIN ═══
async function doLogin(){
  let n=document.getElementById('userIn').value.trim();
  if(n.length<2){document.getElementById('loginErr').textContent='At least 2 characters!';return}
  G.un=n;ld();if(!G.sc)G.sc=0;sv();document.getElementById('loginErr').textContent='';showMenu()
}
function logout(){G.un='';G.sc=0;G.stars={};sv();document.body.className='';ss('login')}

// ═══ MENU ═══
function showMenu(){
  document.body.className='lv0';
  ss('menu');document.getElementById('mPl').textContent=G.un;document.getElementById('mSc').textContent='★ '+G.sc;
  document.getElementById('btnCountry').textContent='🏳️ '+G.country;
  // Sync hard mode toggle
  document.getElementById('hardSwitch').checked=G.hard;
  document.getElementById('hardLabel').textContent=G.hard?'⚡ HARD ON':'HARD MODE';
  // Sync sum button
  let sb=document.getElementById('sumBtn');
  sb.textContent=G.sum?'Σ SUM ON':'Σ SUM';
  sb.style.borderColor=G.sum?'#ff0':'';
  sb.style.color=G.sum?'#ff0':'';
  let l=document.getElementById('lvList');l.innerHTML='';
  LV.forEach((v,i)=>{
    let s=G.stars[v.id]||0,lk=i>0&&!G.stars[LV[i-1].id];
    let d=document.createElement('div');d.className='lc'+(lk?' lk':'');
    d.innerHTML=`<div class="emo">${v.e}</div><div class="info"><div class="nm">${v.n}</div><div class="ds">${v.d}</div></div><div class="st">${lk?'🔒':'★'.repeat(s)+'☆'.repeat(3-s)}</div>`;

  })

async function loadSidebarLB(){

    let data=await fetchLB(null);

      <span class="nm">${e.username}<span class="co">${e.country||''}</span></span>
      <span class="sc">${e.score}</span></div>`
    }).join('')}
    document.getElementById('deskSidebar').classList.add('show');
  }catch(e){
    document.getElementById('deskLB').innerHTML='<div class="r"><span>Scoreboard offline</span></div>';
    document.getElementById('deskSidebar').classList.add('show');
  }
}

// ═══ LEVEL ═══
function startLv(idx){G.lv=idx;G.stage=0;G.results=[];document.body.className='lv'+LV[idx].id;ss('game');upHUD();gen()}
function retryLv(){G.stage=0;G.results=[];document.body.className='lv'+LV[G.lv].id;ss('game');upHUD();gen()}
function quitLv(){if(G.tid)clearInterval(G.tid);G.lv=null;document.body.className='lv0';postScore();showMenu()}
function quitToMenu(){quitLv()}

function upHUD(){
  let lv=LV[G.lv];document.getElementById('gPl').textContent=G.un;
  document.getElementById('gLv').textContent='Lv.'+lv.id+' '+lv.n;
  document.getElementById('gSc').textContent='★ '+G.sc;
  let d=document.getElementById('gDots');d.innerHTML='';
  for(let i=0;i<3;i++){let s=document.createElement('span');
   if(G.results[i]===true)s.className='ok';else if(G.results[i]===false)s.className='no';
   else if(i===G.stage)s.className='now';d.appendChild(s)}
  document.getElementById('gStage').textContent='Stage '+(G.stage+1)+' of 3'
}

function toggleHard(){
  G.hard=document.getElementById('hardSwitch').checked;
  document.getElementById('hardLabel').textContent=G.hard?'⚡ HARD ON':'HARD MODE';
  if(G.hard){startMatrix()}else{stopMatrix()}
}

function toggleSum(){
  G.sum=!G.sum;
  let btn=document.getElementById('sumBtn');
  btn.textContent=G.sum?'Σ SUM ON':'Σ SUM';
  btn.style.borderColor=G.sum?'#ff0':'';
  btn.style.color=G.sum?'#ff0':'';
}

// ═══ Timer safety — always clean before starting new ═══
function killTimer(){
  if(G.tid){clearInterval(G.tid);G.tid=null}
  let el=document.getElementById('timerD');if(el){el.classList.remove('blk');el.textContent=''}
  let bar=document.getElementById('timerBar');if(bar)bar.style.display='none'
}

function gen(){
  killTimer(); // safety: kill any leftover timer
  let lv=LV[G.lv],st=lv.s[G.stage];upHUD();
  let d=[];for(let i=0;i<st.dig;i++)d.push(Math.floor(Math.random()*10));
  if(G.sum){
    // ═══ SUM MODE: show "4 + 7 + 2", expected = 13 ═══
    G.seq=d.join(' + ');
    G.exp=String(d.reduce((a,b)=>a+b,0));
  } else {
    G.seq=d.join('');G.exp=G.seq;
  }
  document.getElementById('phaseMemo').style.display='block';
  document.getElementById('phaseRecall').style.display='none';
  document.getElementById('seqD').textContent=G.seq;
  document.getElementById('fbEl').textContent='';
  if(G.tid)clearInterval(G.tid);G.tid=null;

  if(G.hard){
    // ═══ HARD MODE: auto-countdown for memorize ═══
    document.getElementById('memBtn').style.display='none';
    document.getElementById('chickenBtn').style.display='none';
    document.getElementById('timerBar').style.display='none';
    document.getElementById('memoInfo').textContent='⚡ HARD — memorizing…';
    let memoTime=4+lv.id; // same as normal typing timer
    let timerEl=document.getElementById('timerD');timerEl.textContent=memoTime;timerEl.classList.add('blk');
    document.getElementById('timerBar').style.display='block';
    let r=memoTime;
    G.tid=setInterval(()=>{r--;timerEl.textContent=r;
     if(r<=0){clearInterval(G.tid);G.tid=null;
      document.getElementById('timerBar').style.display='none';timerEl.classList.remove('blk');
      document.getElementById('phaseMemo').style.display='none';
      // Show typing phase — no timer (or 15s for level 9)
      hardRecall();
     }},1000);
  } else {
    // ═══ NORMAL MODE: button to start timer ═══
    document.getElementById('memoInfo').textContent='remember it… then press the button (or SPACE)';
    let btn=document.getElementById('memBtn');btn.style.display='inline-block';btn.disabled=false;
    document.getElementById('chickenBtn').style.display='inline-block';
    document.getElementById('timerBar').style.display='none';
  }
}

function hardRecall(){
  killTimer(); // safety
  document.getElementById('phaseRecall').style.display='block';
  let inp=document.getElementById('ansIn');inp.value='';inp.focus();
  document.getElementById('fbEl').textContent='';

  if(G.lv===8){ // Level 9 (0-indexed)
    document.getElementById('memoInfo').textContent='⚡ Type it! 15 seconds!';
    document.getElementById('timerBar').style.display='block';
    let timerEl=document.getElementById('timerD');timerEl.textContent='15';timerEl.classList.add('blk');
    G.ts=Date.now();let r=15;
    G.tid=setInterval(()=>{r--;timerEl.textContent=r;
     if(r<=0){killTimer();
      G.results[G.stage]=false;
      document.getElementById('fbEl').textContent='⏰ TIME!';document.getElementById('fbEl').className='fb b';
      setTimeout(()=>{
       document.getElementById('flDetail').innerHTML='Time ran out!<br>Sequence was: <b style="color:#fff">'+G.exp+'</b><br>Level 9 — THE MATRIX 💊';
       ss('lvFail');let rb=document.getElementById('lvFail').querySelector('.b.o');if(rb)rb.style.display='';
      },600);
     }},1000);
  } else {
    document.getElementById('timerBar').style.display='none';
  }
}

function chickenOut(){
  killTimer();
  let excuses=[
    "brain needs stretching… 🧘","too much coffee, brb ☕","forgot how to count 🤷",
    "the dog ate my memory 🐕","need a nap first 💤","studying the numbers… intensely 📖",
    "rubber duck debugging my brain 🦆","neurons still booting up ⏳","contemplating life choices 🤔",
    "need more RAM 🖥️","the voices said no 👻","blinked and lost it 😵",
    "meditating on it 🧘‍♂️","calling my mom first 📞","the matrix is glitching 💊"
  ];
  let excuse=excuses[Math.floor(Math.random()*excuses.length)];
  document.getElementById('flDetail').innerHTML=excuse;
  ss('lvFail');
  document.getElementById('lvFail').querySelector('.b.o').style.display='none'; // hide Retry
}

function startTimer(){
  killTimer(); // safety
  let lv=LV[G.lv];
  let totalTime = 4 + lv.id;  // Level 1=5s, Level 9=13s (~14s)
  document.getElementById('memBtn').style.display='none';
  document.getElementById('chickenBtn').style.display='none';
  document.getElementById('memoInfo').textContent='GO! Type it back!';
  let timerBar=document.getElementById('timerBar');timerBar.style.display='block';
  let timerEl=document.getElementById('timerD');timerEl.textContent=totalTime;timerEl.classList.add('blk');
  G.ts=Date.now();let r=totalTime;
  G.tid=setInterval(()=>{r--;timerEl.textContent=r;
   if(r<=0){killTimer();
    document.getElementById('phaseMemo').style.display='none';
    // Time's up = wrong
    G.results[G.stage]=false;
    document.getElementById('fbEl').textContent='⏰ TIME!';
    document.getElementById('fbEl').className='fb b';
    setTimeout(()=>{
     document.getElementById('flDetail').innerHTML='Time ran out!<br>Sequence was: <b style="color:#fff">'+G.exp+'</b><br>Level '+lv.id+' — '+lv.n;
     ss('lvFail');
     let rb=document.getElementById('lvFail').querySelector('.b.o');if(rb)rb.style.display='';
    },600);
    // Auto-transition to recall for UI consistency
    document.getElementById('phaseRecall').style.display='block';
   }},1000);
  // Show recall input immediately
  setTimeout(()=>{
   document.getElementById('phaseMemo').style.display='none';
   document.getElementById('phaseRecall').style.display='block';
   let inp=document.getElementById('ansIn');inp.value='';inp.focus();
  },400);
}

function check(a){
  a=a.trim();if(!a)return;
  let lv=LV[G.lv],st=lv.s[G.stage];
  let ok=a===G.exp;
  if(ok){
    killTimer();
    // Scoring: hard mode = flat points (no time bonus, except level 9)
    let pts;
    if(G.hard && G.lv!==8){
      pts=Math.floor(150*lv.id*st.m); // flat higher base, no time bonus
    } else {
      let elapsed=(Date.now()-G.ts)/1000;
      let totalTime=G.hard?15:(4+lv.id);
      let timeBonus=Math.max(0,Math.floor((totalTime-elapsed)*30));
      pts=Math.floor(100*lv.id*st.m+timeBonus);
    }
    G.sc+=pts;G.results[G.stage]=true;sv();
    let fb=document.getElementById('fbEl');fb.innerHTML='✓ CORRECT!<br><span class="pts">+'+pts+' pts</span>';fb.className='fb g';
    G.stage++;
    if(G.stage>=3){
      let stars=G.results.filter(r=>r===true).length;G.stars[lv.id]=Math.max(G.stars[lv.id]||0,stars);
      sv();postScore();setTimeout(()=>lvlDone(pts,stars),700)
    }else setTimeout(()=>gen(),700)
  }else{
    G.results[G.stage]=false;
    document.getElementById('fbEl').textContent='✗ WRONG!';document.getElementById('fbEl').className='fb b';
    setTimeout(()=>{
      document.getElementById('flDetail').innerHTML='Was: <b style="color:#fff">'+G.exp+'</b><br>You typed: <b style="color:#f44">'+a+'</b><br>Level '+lv.id+' — '+lv.n;
      ss('lvFail');
      let rb=document.getElementById('lvFail').querySelector('.b.o');if(rb)rb.style.display='';
    },700)
  }
}

function lvlDone(pts,stars){
  let lv=LV[G.lv];ss('lvDone');
  document.getElementById('dnName').textContent=lv.e+' '+lv.n;
  document.getElementById('dnScore').textContent='+'+G.sc;
  document.getElementById('dnStars').textContent='★'.repeat(stars)+'☆'.repeat(3-stars);
  let nx=document.getElementById('dnNext');nx.innerHTML='';
  if(G.lv<LV.length-1){
   let b=document.createElement('button');b.className='b c';b.textContent='Next: '+LV[G.lv+1].n;b.onclick=()=>startLv(G.lv+1);nx.appendChild(b)
  }else{nx.innerHTML='<div class="big or" style="font-size:1.1rem">🏆 YOU BEAT IT 🏆</div>'}
  let mb=document.createElement('button');mb.className='b s';mb.style.marginTop='8px';
  mb.textContent='Menu';mb.onclick=()=>{G.lv=null;showMenu()};nx.appendChild(mb)
}

// ═══ MATRIX RAIN (hard mode) ═══
let matrixAnim=null;
function startMatrix(){
  let c=document.getElementById('matrixRain'),ctx=c.getContext('2d');
  c.width=window.innerWidth;c.height=window.innerHeight;
  c.style.opacity='0.12';
  let cols=Math.floor(c.width/14),drops=[];
  for(let i=0;i<cols;i++)drops[i]=Math.random()*-100;
  let chars='01'; // only 0s and 1s
  function draw(){
    ctx.fillStyle='rgba(0,0,0,0.05)';ctx.fillRect(0,0,c.width,c.height);
    ctx.fillStyle='#0f0';ctx.font='13px monospace';
    for(let i=0;i<drops.length;i++){
      let ch=chars[Math.floor(Math.random()*2)];
      ctx.fillText(ch,i*14,drops[i]*14);
      if(drops[i]*14>c.height&&Math.random()>.975)drops[i]=0;
      drops[i]++;
    }
  }
  matrixAnim=setInterval(draw,50);
  window.addEventListener('resize',()=>{c.width=window.innerWidth;c.height=window.innerHeight});
}
function stopMatrix(){
  let c=document.getElementById('matrixRain');c.style.opacity='0';
  if(matrixAnim){clearInterval(matrixAnim);matrixAnim=null}
}

// ═══ NUMPAD (custom number pad) ═══
document.addEventListener('DOMContentLoaded',()=>{
  let pad=document.getElementById('numpad');
  if(!pad)return;
  // Touch + click for instant response (no 300ms delay)
  pad.addEventListener('touchstart',function(e){
    e.preventDefault();
    let btn=e.target.closest('.nk');
    if(!btn)return;
    btn.classList.add('pressed');
    let k=btn.getAttribute('data-key');
    if(k==='del')padBack();
    else if(k==='go')padSubmit();
    else if(k)padPress(k);
    setTimeout(()=>btn.classList.remove('pressed'),100);
  },{passive:false});
  pad.addEventListener('click',function(e){
    let btn=e.target.closest('.nk');
    if(!btn)return;
    let k=btn.getAttribute('data-key');
    if(k==='del')padBack();
    else if(k==='go')padSubmit();
    else if(k)padPress(k);
  });
});

function padPress(d){
  let inp=document.getElementById('ansIn');inp.value+=d;inp.focus()
}
function padBack(){
  let inp=document.getElementById('ansIn');inp.value=inp.value.slice(0,-1);inp.focus()
}
function padSubmit(){
  check(document.getElementById('ansIn').value)
}
